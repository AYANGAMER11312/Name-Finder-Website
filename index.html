<style>

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background-size: 400% 400%;
    animation: gradientAnimation 15s ease infinite;
    color: white;
    text-align: center;
    padding: 0;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  @keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }

  .content {
    flex: 1;
    padding: 20px;

    border-radius: 25px;
    border: 2px solid white;
    font-size: 16px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-weight: bold;
    outline: none;
    transition: 0.3s;
  }

  select:hover {
    background: white;
    color: #e73c7e;
  }

  select option {
    background: #e73c7e;
    color: white;
  }

  #names {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .name-box {
    background: rgba(255, 255, 255, 0.95);
    color: #333;
    padding: 18px 10px;
    border-radius: 15px;
    font-weight: 800;
    font-size: 1.1rem;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    border-bottom: 4px solid #e73c7e;
  }

  .name-box:hover {
    transform: translateY(-10px);
    background: #fff;
    color: #e73c7e;
    box-shadow: 0 12px 25px rgba(0,0,0,0.3);
  }

  /* Footer Styling */
  footer {
    background: rgba(0, 0, 0, 0.4);
    padding: 25px;
    margin-top: 50px;
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  footer p {
    margin: 8px 0;
    font-size: 16px;
    letter-spacing: 0.5px;
  }

  footer a {
    color: #23d5ab;
    text-decoration: none;
    font-weight: bold;
    background: rgba(255,255,255,0.1);
    padding: 5px 12px;
    border-radius: 15px;
    transition: 0.3s;
  }

  footer a:hover {
    background: #23d5ab;
    color: black;
  }
</style>
